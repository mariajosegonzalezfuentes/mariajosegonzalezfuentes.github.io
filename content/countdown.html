<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CountDown Timer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.2.1/moment.min.js"></script>    
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: #ffffff;
      color: #37352F;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
      align-items: center;
      justify-content: center;
      display: flex;
    }
    #timer {
      display: flex;
      flex-direction: row;
      text-transform: uppercase;
      font-size: .7em;
      letter-spacing: 5px;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .days,
    .hours {
      padding-left: 10px;
      padding-right: 10px;
      padding-top: 20px;
      padding-bottom: 20px;
    }

    #title {
      text-align: center;
      font-size: .8em;
      color: #37352F;
    }

    #days  { color: #37352F; }
    #hours { color: #37352F; }

    .nw-poweredby {
      color: #37352F;
      letter-spacing: normal;
      z-index: 8; 
      align-self: center; 
      order: 2; 
      flex-grow: 0; 
      flex-shrink: 0; 
      margin: 10px 0px 10px; 
      white-space: pre-wrap; 
      overflow: visible; 
      word-break: break-word; 
      line-height: 1.5; 
      border-radius: 0px; 
      opacity: 1; 
      font-family: Helvetica; 
      font-size: 9px; 
      font-weight: 400; 
      text-align: center;
      cursor: pointer;
    }

    .numbers {
      font-weight: bold;
      font-size: 3em;
      text-align: center;
    }
  </style>
</head>

<body>
  <div>
    <div id="timer">
      <div class="days">
        <div id="days" class="numbers"></div>
        days
      </div>
      <div class="hours">
        <div id="hours" class="numbers"></div>
        hours
      </div>
    </div>
    <h1 id="nw-ad" class="nw-poweredby">fuuuuuuuun life jiji</h1>
  </div>
</body>

<script>
  document.getElementById("nw-ad").addEventListener("click", openLink);
  function openLink() {
    window.open("https://www.widgetly.co/?utm_source=countdown-timer&utm_content=poweredby");
  }

  let countUp = false;

  const myDate = new Date('2026-06-16T14:54:00.264Z');
  const startTime = new Date('2026-04-22T14:54:00.265Z');
  const startDateOfTimer = moment(startTime);
  const startDate = moment(myDate);

  const padLeft = (num) => {
    if (String(num).length > 2) return num;
    return String("00" + num).slice(-2);
  }

  let intervalId;

  function triggerConfetti() {
    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
  }

  function updateTimer() {
    let today = startDateOfTimer.isAfter(moment()) ? startDateOfTimer : moment();

    let diff = countUp
      ? moment.duration(today.diff(startDateOfTimer))
      : moment.duration(startDate.diff(today));

    if (diff <= 0) {
      clearInterval(intervalId);
      document.getElementById("timer").innerHTML = "Countdown ended!";
      if (document.getElementById("title")) document.getElementById("title").remove();
      triggerConfetti();
      return;
    }

    const dayRaw = Math.floor(diff.asDays());
    const hrsRaw = Math.floor(diff.subtract(dayRaw, "d").asHours());

    document.getElementById("days").innerHTML  = padLeft(dayRaw);
    document.getElementById("hours").innerHTML = padLeft(hrsRaw);
  }

  intervalId = setInterval(updateTimer, 1000);
</script>
</html>
